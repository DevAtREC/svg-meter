<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Utility Meter - 2026 Edition</title>
    <style>
        .meter-container { 
            width: 100%; 
            max-width: 500px; 
            margin: 40px auto; 
        }
        svg { width: 100%; height: auto; overflow: visible; }
        /* Subtle glow when hovering over an icon */
        g[role="img"]:hover { cursor: help; filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="meter-container">
    <!-- viewBox expanded to -10 -10 120 120 to provide extra padding for all 6 overlays -->
    <svg viewBox="-10 -10 120 120" xmlns="http://www.w3.org">
        
        <!-- 1. Main Meter Face -->
        <circle cx="50" cy="50" r="48" fill="green" stroke="black" stroke-width="2" />

        <!-- 2. The Three Dials -->
        <g fill="#1a1a1a" stroke="#444" stroke-width="0.5">
            <circle cx="28" cy="38" r="10" />
            <circle cx="50" cy="33" r="10" />
            <circle cx="72" cy="38" r="10" />
        </g>

        <!-- 3. Gauge Needles -->
        <g stroke="yellow" stroke-width="1.5" stroke-linecap="round">
            <line x1="28" y1="38" x2="23" y2="30" />
            <line x1="50" y1="33" x2="58" y2="28" />
            <line x1="72" y1="38" x2="80" y2="43" />
        </g>

        <!-- 4. ABC Labels -->
        <g font-family="Arial, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">
            <text x="28" y="58">A</text>
            <text x="50" y="53">B</text>
            <text x="72" y="58">C</text>
        </g>

        <!-- 5. STATUS OVERLAYS -->

        <!-- Remote Disconnect (12 o'clock) -->
        <g transform="translate(50, 6)" role="img">
            <title>Remote Disconnect: Meter equipped with internal switch</title>
            <circle r="8" fill="#e6e6e6" stroke="black" stroke-width="0.5" />
            <path d="M-4 2 L-1 2 L1 -2 L4 -2" fill="none" stroke="red" stroke-width="1.5" />
            <circle cx="-4" cy="2" r="1" fill="red" />
            <circle cx="4" cy="-2" r="1" fill="red" />
        </g>

        <!-- Key Account (2 o'clock) - NOW A KEY ICON -->
        <g transform="translate(89, 27.5)" role="img">
            <title>Key Account: Industrial/High-Load Customer</title>
            <circle r="8" fill="#333" stroke="white" stroke-width="0.5" />
            <!-- Simple Key Shape -->
            <circle cx="-2" cy="0" r="2.5" fill="none" stroke="gold" stroke-width="1.2" />
            <line x1="0.5" y1="0" x2="5" y2="0" stroke="gold" stroke-width="1.2" />
            <line x1="3" y1="0" x2="3" y2="2" stroke="gold" stroke-width="1.2" />
            <line x1="4.5" y1="0" x2="4.5" y2="2" stroke="gold" stroke-width="1.2" />
        </g>

        <!-- Medical Necessity (4 o'clock) -->
        <g transform="translate(89, 72.5)" role="img">
            <title>Medical Necessity: Life Support on Premise</title>
            <circle r="8" fill="white" stroke="black" stroke-width="0.5" />
            <rect x="-5" y="-1.5" width="10" height="3" fill="red" />
            <rect x="-1.5" y="-5" width="3" height="10" fill="red" />
        </g>

        <!-- Net Metering (6 o'clock) - SUN + BATTERY -->
        <g transform="translate(50, 94)" role="img">
            <title>Net Metering: Solar & Battery Storage on Site</title>
            <circle r="8" fill="#87CEEB" stroke="black" stroke-width="0.5" />
            <!-- Mini Sun (Left) -->
            <circle cx="-2.5" cy="-1.5" r="1.5" fill="yellow" stroke="orange" stroke-width="0.3" />
            <!-- Mini Battery (Right) -->
            <rect x="0.5" y="0" width="4" height="2.5" fill="white" stroke="black" stroke-width="0.5" />
            <rect x="4.5" y="0.7" width="0.8" height="1.1" fill="black" />
            <rect x="1" y="0.5" width="1.2" height="1.5" fill="#4caf50" />
        </g>

        <!-- Situational Awareness (8 o'clock) -->
        <g transform="translate(11, 72.5)" role="img">
            <title>Hazard Alert: Situational Awareness (Dog/Owner)</title>
            <circle r="8" fill="#ffcc00" stroke="black" stroke-width="0.5" />
            <path d="M0 -5 L5 4 L-5 4 Z" fill="black" />
            <text y="3" font-size="5" fill="white" text-anchor="middle" font-family="Arial" font-weight="bold">!</text>
        </g>

        <!-- Critical Infrastructure (10 o'clock) -->
        <g transform="translate(11, 27.5)" role="img">
            <title>Critical Infrastructure: Priority Restoration</title>
            <circle r="8" fill="#0055ff" stroke="white" stroke-width="0.5" />
            <rect x="-4" y="-4" width="8" height="8" fill="white" />
            <path d="M-5 -1 L0 -6 L5 -1 Z" fill="white" />
        </g>

    </svg>
</div>

</body>
</html>
